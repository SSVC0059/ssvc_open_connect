site_name: SSVC Open Connect
# Для превью в подкаталоге (CI) задайте SITE_URL, например .../previews/pr-42/
site_url: !ENV [SITE_URL, "https://SSVC0059.github.io/ssvc_open_connect/"]

site_author: thedemoncat
site_description: >-
 Модуль расширения функционала автоматики отбора для ректификации  SSVC0059V2,

repo_name: SSVC0059/ssvc_open_connect
repo_url: https://github.com/SSVC0059/ssvc_open_connect


theme:
  name: material
  logo: media/logo.png
  favicon: media/favicon.png
  icon:
    repo: fontawesome/brands/github
  palette:
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
      primary: blue
      accent: blue

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
      primary: indigo
      accent: indigo

  features:
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - toc.follow
    - navigation.top
    - content.code.copy


nav:
  - Главная: index.md
  - "Подготовка":
      - preparation/controller.md
      - preparation/driver.md
      - preparation/firmware.md
      - preparation/flasher.md
      - preparation/flasher_manual.md
      - preparation/adafruit_webserial_esptool.md
  - "Интерфейсы и Периферия" : 
      - usage/interfaces/power.md
      - usage/interfaces/uart.md
      - usage/interfaces/ds18b20.md
      - usage/interfaces/bmp581.md
      - usage/interfaces/rgb_led.md
      - hardware/ds3231-rtc.md
  - "Начало работы":
      - usage/get_started.md
  - "Использование":
      - calculator/index.md
  - "Поддерживаемые контроллеры":
    - "KC868-A6v3":
      - "Описание (KinCony)": boards/kc868-a6/KC868-A6v3-KinCony.ru.md
      - "Распиновка GPIO": boards/kc868-a6/GPIO_Pinout.md
      - "I2C устройства": boards/kc868-a6/I2C_devices.md
    - "Готовые модули":
        - ready_made/connect.md
        - ready_made/din_version.md
        - ready_made/inside_version.md
  - Для разработчиков: develop/
  - "FAQ": faq/faq.md
  - "Прочее" :
      - info/changelog.md
      - ssvc serial protocol/develop/Readme.md


markdown_extensions:
  - attr_list
  - md_in_html
  - tables
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

      
extra_javascript:
  # Глобальная загрузка: корректный URL при подкаталоге (GitHub Pages) и срабатывание вместе с document$ при instant navigation
  - calculator/rectification_calculator.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/thedemoncat
  consent:
    title: Cookie consent
    description: >-
      Сайт использует cookie-файлы, чтобы сделать ваше пребывание на нём максимально удобным. 
      Оставаясь на сайте, вы даёте своё согласие на использование cookie-файлов.
    actions:
      - accept
      - reject

plugins:
  - mkdocs-pdf
  - search:
      separator: '[\s\-,:!=\[\]()"/]+|(?!\b)(?=[A-Z][a-z])|\.(?!\d)|&[lg]t;'
  - autorefs
  - literate-nav:
      nav_file: README.md
      implicit_index: true
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_section_style: list
            members_order: source
            show_root_heading: true
            show_source: false
            show_signature_annotations: true

copyright: |
  Copyright &copy; 2025 by <a href="https://github.com/thedemoncat"  target="_blank" rel="noopener">elims</a> -
  <a href="#__consent">Изменить настройки файлов cookie</a>