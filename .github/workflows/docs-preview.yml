# Превью документации в gh-pages: каталог previews/pr-<номер>/ (один сегмент: pr-42, не pr/42).
# Работает только для PR из веток этого репозитория (не из fork).
name: Docs preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: gh-pages-updates
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  deploy-preview:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    env:
      SITE_URL: https://SSVC0059.github.io/ssvc_open_connect/previews/pr-${{ github.event.pull_request.number }}/
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '20'

      - name: Build calculator
        run: npm ci && npx svelte-kit sync && npm run build:calculator && npm run test:run
        working-directory: interface

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Build MkDocs (preview base URL)
        run: mkdocs build
        env:
          PYTHONUTF8: '1'
          PYTHONIOENCODING: utf-8

      - name: Publish preview to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./site
          destination_dir: previews/pr-${{ github.event.pull_request.number }}
          keep_files: true
          user_name: github-actions
          user_email: github-actions@github.com
          commit_message: 'docs(preview): PR #${{ github.event.pull_request.number }} @ ${{ github.sha }}'

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request.number;
            const url = `https://SSVC0059.github.io/ssvc_open_connect/previews/pr-${pr}/`;
            const marker = '<!-- docs-preview-bot -->';
            const body = `${marker}\n**Документация (preview):** ${url}`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr,
              per_page: 100,
            });
            const existing = comments.find((c) => (c.body || '').includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr,
                body,
              });
            }
