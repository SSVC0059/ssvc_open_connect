name: Deploy MkDocs
on:
  push:
    branches:
      - master
      - main
      - edit_docs
  workflow_dispatch:
    # Ручной запуск: Actions → Deploy MkDocs → Run workflow → выбрать ветку

concurrency:
  group: gh-pages-updates
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '20'

      - name: Build calculator
        run: npm ci && npx svelte-kit sync && npm run build:calculator && npm run test:run
        working-directory: interface
      
      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: E2E (Playwright, калькулятор)
        run: |
          cd e2e
          npm ci
          npx playwright install --with-deps chromium
          npx playwright test
        env:
          CI: true
          PYTHONUTF8: '1'
          PYTHONIOENCODING: utf-8
          
      - name: Build MkDocs site
        run: mkdocs build
        env:
          PYTHONUTF8: '1'
          PYTHONIOENCODING: utf-8

      # keep_files: true — не удалять каталог previews/ от PR (см. docs-preview.yml)
      - name: Publish site to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./site
          keep_files: true
          user_name: github-actions
          user_email: github-actions@github.com
          commit_message: 'docs: deploy ${{ github.sha }}'