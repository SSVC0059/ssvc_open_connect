name: Deploy MkDocs
on:
  push:
    branches:
      - master
      - main
      - edit_docs
  workflow_dispatch:
    # Ручной запуск: Actions → Deploy MkDocs → Run workflow → выбрать ветку

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Build calculator
        run: npm install && npx svelte-kit sync && npm run build:calculator
        working-directory: interface
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          pip install "mkdocs<2" mkdocs-material mkdocs-autorefs mkdocs-literate-nav mkdocstrings-python mkdocs-git-committers-plugin-2
          
      - name: Build and Deploy
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          mkdocs gh-deploy --force