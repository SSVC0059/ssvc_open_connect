# Ночная сборка: перезаписывает релиз "nightly" ежедневно.
# Не отображается в statusbar (prerelease исключается из /releases/latest).
# В GithubFirmwareManager — в отдельной секции с предупреждением.

name: Nightly Build

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  frontend-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install npm dependencies
        run: npm install
        working-directory: interface

      - name: Build interface
        run: npm run build
        working-directory: interface

      - name: Build calculator
        run: npm run build:calculator
        working-directory: interface

      - name: Upload calculator artifact
        uses: actions/upload-artifact@v4
        with:
          name: calculator-artifact
          path: docs/calculator/rectification_calculator.js

  native-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install PlatformIO
        run: pip install -r requirements.txt

      - name: Run native unit tests
        run: pio test -e native

  build:
    runs-on: ubuntu-latest
    needs: [frontend-checks, native-tests]
    strategy:
      matrix:
        include:
          - env_name: esp32-s3-devkitc-1-8m
          - env_name: esp32-s3-devkitc-1-8m-secure
          - env_name: esp32-s3-devkitc-1-16m
          - env_name: esp32-s3-devkitc-1-16m-secure

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Python requirements
        run: pip install -r requirements.txt

      - name: Download calculator artifact
        uses: actions/download-artifact@v4
        with:
          name: calculator-artifact
          path: docs/calculator

      # ВАЖНО: версия и тег должны быть валидным SemVer (MAJOR.MINOR.PATCH-prerelease).
      # Формат: base из platformio.ini + "-nightly." + ветка (слэш/дефис → точка), тег = "v${FULL}".
      - name: Set nightly version and tag (always valid semver)
        id: ver
        run: |
          BASE=$(grep APP_VERSION platformio.ini | head -1 | sed 's/.*"\([^"]*\)".*/\1/' || true)
          if [ -z "$BASE" ] || ! echo "$BASE" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+'; then
            echo "WARNING: Could not read base version from platformio.ini, using 0.0.0"
            BASE="0.0.0"
          fi
          echo "base=$BASE" >> $GITHUB_OUTPUT
          BRANCH="${{ github.ref_name }}"
          BRANCH_NORM=$(echo "$BRANCH" | tr '/-' '.' | sed 's/^v//')
          [ -z "$BRANCH_NORM" ] && BRANCH_NORM="unknown"
          FULL="${BASE}-nightly.${BRANCH_NORM}"
          TAG="v${FULL}"
          echo "full=$FULL" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Using version: $FULL (tag: $TAG)"
          echo "PLATFORMIO_BUILD_FLAGS=-D APP_VERSION=\\\"${FULL}\\\"" >> $GITHUB_ENV

      - name: Build firmware for ${{ matrix.env_name }}
        run: platformio run --environment ${{ matrix.env_name }}

      - name: Collect artifacts for ${{ matrix.env_name }}
        run: |
          mkdir -p artifacts/firmware/${{ matrix.env_name }} artifacts/zips
          cp docs/calculator/rectification_calculator.js artifacts/firmware/${{ matrix.env_name }}/
          cp -r build/${{ matrix.env_name }}/* artifacts/firmware/${{ matrix.env_name }}/
          (cd artifacts/firmware/${{ matrix.env_name }} && zip -r ../../zips/${{ matrix.env_name }}.zip .)

      - name: Upload zip for ${{ matrix.env_name }}
        uses: actions/upload-artifact@v4
        with:
          name: nightly-${{ matrix.env_name }}
          path: artifacts/zips/${{ matrix.env_name }}.zip

      - name: Upload firmware binaries for ${{ matrix.env_name }}
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.env_name }}
          path: artifacts/firmware/${{ matrix.env_name }}/SSVC-Open-Connect_*
          if-no-files-found: error

  update-nightly-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          find all-artifacts -type f \( -name "*.bin" -o -name "*.md5" -o -name "*.zip" \) -exec cp {} release-assets/ \;
          echo "--- release-assets contents ---"
          ls -la release-assets/
          BIN_COUNT=$(find release-assets -maxdepth 1 -name "*.bin" | wc -l)
          if [ "$BIN_COUNT" -eq 0 ]; then
            echo "ERROR: No .bin files in release-assets. Check artifact upload paths."
            exit 1
          fi

      - name: Set build date
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Update nightly release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: "Nightly (${{ steps.date.outputs.date }})"
          prerelease: true
          draft: false
          update_existing_release: true
          body: |
            ⚠️ **Экспериментальная сборка** — может быть нестабильной.
            Обновляется ежедневно. Используйте только если понимаете риски.
          files: |
            release-assets/*.bin
            release-assets/*.md5
            release-assets/*.zip