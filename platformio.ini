; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = esp32-s3-devkitc-1-16m
description = SSVC OpenConnect
data_dir = data
extra_configs = 
	factory_settings.ini
	features.ini

[env]
framework = arduino
platform = espressif32 @ 6.12.0
upload_speed = 921600
build_flags = 
	${factory_settings.build_flags}
	${features.build_flags}
	-std=gnu++14
	-D BUILD_TARGET=\"$PIOENV\"
	-D APP_NAME=\"SSVC-Open-Connect\"
	-D APP_VERSION=\"0.2.8.0\"
	
	-D ESP32SVELTEKIT_RUNNING_CORE=0
	
	-D EMBED_WWW

	; Uncomment to configure Cross-Origin Resource Sharing
    ; -D ENABLE_CORS
    ; -D CORS_ORIGIN=\"*\"

    ; Uncomment to enable informations from ESP32-Sveltekit in Serial Monitor
    ; -D SERIAL_INFO

    ; Uncomment to skip SSL certificate verification when downloading firmware updates
    -D DOWNLOAD_OTA_SKIP_CERT_VERIFY

	  ; D E B U G   B U I L D F L A G S
    ; ===============================
    ; These build flags are only for debugging purposes and should not be used in production
    -D CONFIG_ARDUHAL_LOG_COLORS

	; Uncomment to show log messages from the ESP Arduino Core and ESP32-SvelteKit
	-D CORE_DEBUG_LEVEL=4

 	; Serve config files from flash and access at /config/filename.json
    ;-D SERVE_CONFIG_FILES

    ; Uncomment to teleplot all task high watermarks to Serial
	-D TELEPLOT_TASKS

    ; Uncomment to use JSON instead of MessagePack for event messages. Default is MessagePack.
    ; -D EVENT_USE_JSON=1

	; Status LED pin is configured in code via DEFAULT_STATUS_LED_PIN (StatusLed.h).
	; PINOUT_USE_GPIO: default 1 in SsvcConnector.h; kincony-kc868-a6 sets 0 (I2C relay path).
	; Optional per board: -D SSVC_RELAY_PCF8574_I2C_ADDR=0x24 -D SSVC_RELAY_PCF8574_DEVICE_ROLE=\"pcf8574_port0\"
	; GPIO alarm path (PINOUT_USE_GPIO=1): override SSVC_PINOUT_ALARM_GPIO_DANGEROUS / CRITICAL if pins conflict.

lib_compat_mode = strict
board_build.embed_files = src/certs/x509_crt_bundle.bin
board_ssl_cert_source = adafruit
monitor_speed = 115200
monitor_filters = 
	esp32_exception_decoder
	log2file
board_build.filesystem = littlefs
extra_scripts = 
	pre:scripts/pio/build_interface.py
	pre:scripts/pio/generate_cert_bundle.py
	scripts/pio/merge_bin.py
	scripts/pio/rename_fw.py
	scripts/pio/save_elf.py
lib_deps = 
	ESP32Async/ESPAsyncWebServer @ ^3.10.0
	bblanchon/ArduinoJson @ ^7.4.2
	paulstoffregen/OneWire@^2.3.8
	https://github.com/milesburton/Arduino-Temperature-Control-Library.git @^4.0.6
	elims/PsychicMqttClient@^0.2.1
	adafruit/Adafruit NeoPixel@^1.12.5

	marian-craciunescu/ESP32Ping @ ^1.7
	
	https://github.com/RobTillaart/UUID.git
	
	jnthas/Improv WiFi Library@^0.0.3

	https://github.com/GyverLibs/FastBot2
	https://github.com/GyverLibs/GTL
	https://github.com/GyverLibs/GSON

	adafruit/Adafruit BMP5xx Library @ ^1.0.2

[common_esp32-s3-devkitc-1-8m]
board = esp32-s3-devkitc-1-n8r2
board_build.mcu = esp32s3
board_build.partitions = default_8MB.csv
board_build.arduino.memory_type = qio_opi
board_upload.before_reset = usb_reset
build_flags = 
	${env.build_flags}
	-DSSVC_OPEN_CONNECT_UART_TX=GPIO_NUM_17
	-DSSVC_OPEN_CONNECT_UART_RX=GPIO_NUM_18
debug_tool = esp-builtin

[env:esp32-s3-devkitc-1-8m]
board = ${common_esp32-s3-devkitc-1-8m.board}
board_build.mcu = ${common_esp32-s3-devkitc-1-8m.board_build.mcu}
board_build.partitions = ${common_esp32-s3-devkitc-1-8m.board_build.partitions}
board_build.arduino.memory_type = ${common_esp32-s3-devkitc-1-8m.board_build.arduino.memory_type}
board_upload.before_reset = ${common_esp32-s3-devkitc-1-8m.board_upload.before_reset}
debug_tool = ${common_esp32-s3-devkitc-1-8m.debug_tool}
build_flags =
	${common_esp32-s3-devkitc-1-8m.build_flags}
	-DFT_SECURITY=0

